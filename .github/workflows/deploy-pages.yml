name: 构建并发布 gh-pages 静态站点

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-publish
  cancel-in-progress: true

jobs:
  publish:
    name: 质量门禁、静态构建与分支发布
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: TypeScript 类型检查
        run: npm run typecheck

      - name: 自动化测试
        run: npm test

      - name: 构建 GitHub Pages 版本
        env:
          GITHUB_PAGES: "true"
        run: npm run build

      - name: 发布构建产物到 gh-pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          touch apps/web/dist/.nojekyll
          cd apps/web/dist
          git init --quiet
          git config user.name "OpenAI Codex"
          git config user.email "codex@openai.com"
          git add -A
          git commit --quiet -m "部署 v0.3.1 静态网页"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin HEAD:refs/heads/gh-pages

      - name: 回传 gh-pages 发布状态
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/pages-status
          cd /tmp/pages-status
          git init --quiet
          git config user.name "OpenAI Codex"
          git config user.email "codex@openai.com"
          cat > status.json <<EOF
          {
            "version": "0.3.1",
            "sourceSha": "${SOURCE_SHA}",
            "build": "success",
            "deploy": "gh-pages-branch-ready",
            "pageUrl": "https://lin14159265.github.io/rocket-recovery-sim/",
            "updatedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          git add status.json
          git commit --quiet -m "记录 v0.3.1 gh-pages 发布状态"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin HEAD:refs/heads/pages-deployment-status
