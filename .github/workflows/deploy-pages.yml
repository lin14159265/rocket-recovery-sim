name: 构建并部署 GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: 质量门禁与静态构建
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: TypeScript 类型检查
        run: npm run typecheck

      - name: 自动化测试
        run: npm test

      - name: 构建 GitHub Pages 版本
        env:
          GITHUB_PAGES: "true"
        run: npm run build

      - name: 配置并启用 GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: 上传静态站点
        uses: actions/upload-pages-artifact@v4
        with:
          path: apps/web/dist

  deploy:
    name: 发布网页
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
