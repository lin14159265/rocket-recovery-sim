name: 诊断 GitHub Pages API

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: 输出 Pages API 响应
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          API="https://api.github.com/repos/${GITHUB_REPOSITORY}/pages"
          COMMON=(-H "Accept: application/vnd.github+json" -H "Authorization: Bearer ${GH_TOKEN}" -H "X-GitHub-Api-Version: 2022-11-28")
          echo '===== GET ====='
          curl --silent --show-error --include "${COMMON[@]}" "$API"
          echo
          echo '===== POST ====='
          curl --silent --show-error --include --request POST "${COMMON[@]}" "$API" --data '{"build_type":"workflow"}'
          echo
          echo '===== PUT ====='
          curl --silent --show-error --include --request PUT "${COMMON[@]}" "$API" --data '{"build_type":"workflow"}'
          echo
