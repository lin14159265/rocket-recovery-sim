name: 原子发布 v0.3.1

on:
  push:
    branches:
      - sync/v0.3.1

permissions:
  contents: write

jobs:
  publish:
    name: 验证并发布 v0.3.1
    runs-on: ubuntu-latest
    steps:
      - name: 检出同步分支
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 还原并检查发布补丁
        run: |
          cat .sync/v0.3.1.patch.gz.b64.part-* | base64 --decode | gzip --decompress > /tmp/v0.3.1.patch
          git apply --check /tmp/v0.3.1.patch
          git apply /tmp/v0.3.1.patch

      - name: 配置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: TypeScript 类型检查
        run: npm run typecheck

      - name: 自动化测试
        run: npm test

      - name: GitHub Pages 生产构建
        env:
          GITHUB_PAGES: "true"
        run: npm run build

      - name: 生成中文原子提交并更新版本分支
        env:
          BASE_COMMIT: 724e3fa45a576894c4d59950264366890638e90c
        run: |
          rm -rf .sync
          rm -f .github/workflows/publish-v0.3.1.yml
          git config user.name "OpenAI Codex"
          git config user.email "codex@openai.com"
          git add -A
          TREE_SHA=$(git write-tree)
          COMMIT_MESSAGE=$(cat <<'EOF'
          发布 v0.3.1：修复验证可信度并部署 GitHub Pages

          版本描述：集中修复场景完整性、数值验证、敏感性解释和前端运行配置一致性问题，并建立从 main 自动质量检查与发布 GitHub Pages 的网页交付链路。

          主要修改：当前 v2 场景执行严格完整校验及指纹核验；步长收敛隔离随机项并统一物理终止时刻；能量账本改为物理 tick 累积并拆分闭合残差；敏感性改为双侧扰动、零值绝对下限和模式边界报告；三维结果使用 run.config，与编辑草稿隔离；追溯表行集合保持稳定；新增 GitHub Pages 自动部署工作流。

          验证：TypeScript 类型检查通过；10 个测试文件、67 项测试通过；GitHub Pages 子路径生产构建通过。
          EOF
          )
          RELEASE_COMMIT=$(printf '%s\n' "$COMMIT_MESSAGE" | git commit-tree "$TREE_SHA" -p "$BASE_COMMIT")
          git push origin "$RELEASE_COMMIT":refs/heads/main "$RELEASE_COMMIT":refs/heads/versions/v0.3.1
