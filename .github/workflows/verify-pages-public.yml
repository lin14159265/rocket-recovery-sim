name: 验收 v0.3.1 GitHub Pages 公网站点

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: 验证首页与静态资源
        run: |
          set -euo pipefail
          SITE='https://lin14159265.github.io/rocket-recovery-sim/'
          STATUS=$(curl --silent --show-error --location --output /tmp/index.html --write-out '%{http_code}' "$SITE")
          echo "首页 HTTP 状态：$STATUS"
          test "$STATUS" = '200'
          grep -q '<title>海上网系回收协同控制实验台</title>' /tmp/index.html
          JS_PATH=$(grep -oE 'src="[^"]+\.js"' /tmp/index.html | head -1 | cut -d'"' -f2)
          CSS_PATH=$(grep -oE 'href="[^"]+\.css"' /tmp/index.html | head -1 | cut -d'"' -f2)
          echo "JavaScript：$JS_PATH"
          echo "CSS：$CSS_PATH"
          JS_STATUS=$(curl --silent --show-error --location --output /dev/null --write-out '%{http_code}' "https://lin14159265.github.io${JS_PATH}")
          CSS_STATUS=$(curl --silent --show-error --location --output /dev/null --write-out '%{http_code}' "https://lin14159265.github.io${CSS_PATH}")
          echo "JavaScript HTTP 状态：$JS_STATUS"
          echo "CSS HTTP 状态：$CSS_STATUS"
          test "$JS_STATUS" = '200'
          test "$CSS_STATUS" = '200'
          echo 'PUBLIC_SITE_VERIFIED=true'
